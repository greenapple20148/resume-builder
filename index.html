<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="ResumeBuildIn — Build beautiful resumes that get you hired. 17 professional themes, live editor, instant PDF download." />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lora:wght@400;600&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=Nunito:wght@300;400;600;700&family=Raleway:wght@300;400;700;900&family=Oswald:wght@400;600;700&family=Cinzel:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Tenor+Sans&family=Josefin+Sans:wght@100;300;400;600&display=swap"
    rel="stylesheet" />
  <meta name="theme-color" content="#0e0d0b" />
  <title>ResumeBuildIn — Build Resumes That Get You Hired</title>
  <script>
    // Prevent flash of wrong theme on load
    (function () {
      var t = localStorage.getItem('resumecraft-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
